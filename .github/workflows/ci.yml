name: CI

on:
  push:
    branches: ["main", "claude/**", "feature/**"]
  pull_request:
    branches: ["main"]

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Python: core crypto tests + security checks
  # ────────────────────────────────────────────────────────────────────────────
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      # liboqs-dev is not in Ubuntu APT — build from source
      - name: Cache liboqs build
        id: cache-liboqs
        uses: actions/cache@v4
        with:
          path: ~/liboqs-install
          key: liboqs-0.14.0-${{ runner.os }}

      - name: Build liboqs from source
        if: steps.cache-liboqs.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake ninja-build libssl-dev
          git clone --branch 0.14.0 --depth 1 \
            https://github.com/open-quantum-safe/liboqs.git /tmp/liboqs
          cmake -S /tmp/liboqs -B /tmp/liboqs/build \
            -DCMAKE_INSTALL_PREFIX="${HOME}/liboqs-install" \
            -DBUILD_SHARED_LIBS=ON \
            -DOQS_BUILD_ONLY_LIB=ON \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build /tmp/liboqs/build --parallel $(nproc)
          cmake --install /tmp/liboqs/build

      # liboqs-python looks for the .so in ${HOME}/_oqs/lib/
      - name: Make liboqs visible to liboqs-python
        run: |
          mkdir -p "${HOME}/_oqs"
          cp -r "${HOME}/liboqs-install/." "${HOME}/_oqs/"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Verify oqs import
        run: python -c "import oqs; print('liboqs OK')"

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Type check (mypy)
        run: mypy core/ aggregator/ --strict --ignore-missing-imports

      - name: Security scan (bandit)
        run: bandit -r core/ stark/ aggregator/ -ll

      - name: Dependency vulnerability audit
        run: pip-audit --requirement requirements.txt

  # ────────────────────────────────────────────────────────────────────────────
  # Rust: STARK prover build + integration tests
  # ────────────────────────────────────────────────────────────────────────────
  rust:
    name: Rust STARK prover
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            stark/target
          key: cargo-${{ runner.os }}-${{ hashFiles('stark/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Build release binary
        working-directory: stark
        run: cargo build --release

      - name: Smoke test — prove + verify
        working-directory: stark
        run: |
          RESULT=$(echo '{"leaves":[1,2,3,4,5,6,7,8]}' | ./target/release/qlsa-stark prove)
          COMMITMENT=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['commitment'])")
          PROOF=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['proof'])")
          echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); assert len(d['proof'])>0; assert len(d['commitment'])==16"
          echo '{"proof":"'"$PROOF"'","commitment":"'"$COMMITMENT"'"}' \
            | ./target/release/qlsa-stark verify \
            | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['valid'], 'Proof invalid!'"
          echo "Smoke test passed"

  # ────────────────────────────────────────────────────────────────────────────
  # Rust: Stwo Circle STARK prover (nightly toolchain)
  # ────────────────────────────────────────────────────────────────────────────
  stark_stwo:
    name: Stwo Circle STARK prover
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly-2025-07-01
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-07-01

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            stark_stwo/target
          key: cargo-stwo-${{ runner.os }}-${{ hashFiles('stark_stwo/Cargo.lock') }}
          restore-keys: cargo-stwo-${{ runner.os }}-

      - name: Run unit tests
        working-directory: stark_stwo
        run: cargo +nightly-2025-07-01 test

      - name: Build release binary
        working-directory: stark_stwo
        run: cargo +nightly-2025-07-01 build --release

      - name: Smoke test — prove + verify
        working-directory: stark_stwo
        run: |
          RESULT=$(echo '{"leaves":[1,2,3,4,5,6,7,8]}' \
            | ./target/release/qlsa-stark-stwo prove)
          echo "$RESULT" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert len(d['proof']) > 0
          assert len(d['commitment']) == 8, f'commitment len={len(d[\"commitment\"])}'
          assert d['log_size'] >= 3
          print('prove OK — log_size', d['log_size'], 'commitment', d['commitment'])
          "
          LOG_SIZE=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['log_size'])")
          COMMITMENT=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['commitment'])")
          PROOF=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['proof'])")
          echo "{\"proof\":\"$PROOF\",\"commitment\":\"$COMMITMENT\",\"log_size\":$LOG_SIZE}" \
            | ./target/release/qlsa-stark-stwo verify \
            | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['valid'], 'Proof invalid!'"
          echo "Smoke test passed"

  # ────────────────────────────────────────────────────────────────────────────
  # Contracts: Solidity compile + unit tests (Hardhat)
  # ────────────────────────────────────────────────────────────────────────────
  contracts:
    name: Solidity contracts
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: contracts/package-lock.json

      - name: Install dependencies
        working-directory: contracts
        run: npm install

      - name: Compile contracts
        working-directory: contracts
        run: npx hardhat compile

      - name: Run contract tests
        working-directory: contracts
        run: npx hardhat test
